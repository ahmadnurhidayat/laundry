name: CodeQL

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  schedule:
    - cron: '0 8 * * 1'

permissions:
  contents: read
  security-events: write
  pull-requests: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-latest
    timeout-minutes: 30

    strategy:
      fail-fast: false
      matrix:
        language:
          - javascript-typescript

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}
          queries: security-and-quality

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm run build
        env:
          NEXT_PUBLIC_BASE_URL: ${{ secrets.NEXT_PUBLIC_BASE_URL }}
          NEXT_PUBLIC_SHOP_NAME: ${{ secrets.NEXT_PUBLIC_SHOP_NAME }}
          NEXT_PUBLIC_SHOP_PHONE: ${{ secrets.NEXT_PUBLIC_SHOP_PHONE }}
          NEXT_PUBLIC_SHOP_TAGLINE: ${{ secrets.NEXT_PUBLIC_SHOP_TAGLINE }}

      - name: Perform CodeQL Analysis
        id: codeql
        uses: github/codeql-action/analyze@v4
        with:
          category: /language:${{ matrix.language }}
          output: codeql-results

      - name: Upload SARIF artifact
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: codeql-sarif-${{ matrix.language }}-${{ github.run_id }}
          path: codeql-results/
          retention-days: 14
          if-no-files-found: ignore

      - name: Comment CodeQL result on PR
        if: always() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const outcome = '${{ steps.codeql.outcome }}';
            const marker = '<!-- codeql-result -->';
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c => c.body.includes(marker));
            const passed = outcome !== 'failure';
            const body = [
              marker,
              `## ${passed ? '✅' : '⚠️'} CodeQL Analysis — ${passed ? 'No issues found' : 'Issues detected'}`,
              '',
              `**Language:** \`${{ matrix.language }}\``,
              `**Query suite:** \`security-and-quality\``,
              '',
              passed
                ? 'CodeQL analysis completed with no findings.'
                : '> **Action required:** CodeQL found potential quality or security issues. Check your repository **Security tab > Code scanning alerts** or download the matching `codeql-sarif` artifact for details.',
              '',
              `**Run:** [#${{ github.run_id }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})`,
            ].join('\n');
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }
