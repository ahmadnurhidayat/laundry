name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

env:
  NODE_VERSION: '22'

jobs:
  check:
    name: Type Check
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type check & Build
        run: pnpm build

  build:
    name: Build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: check

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build
        env:
          NODE_ENV: production
          NEXT_PUBLIC_BASE_URL: ${{ secrets.NEXT_PUBLIC_BASE_URL }}
          NEXT_PUBLIC_SHOP_NAME: ${{ secrets.NEXT_PUBLIC_SHOP_NAME }}
          NEXT_PUBLIC_SHOP_PHONE: ${{ secrets.NEXT_PUBLIC_SHOP_PHONE }}
          NEXT_PUBLIC_SHOP_TAGLINE: ${{ secrets.NEXT_PUBLIC_SHOP_TAGLINE }}

      - name: Validate output
        run: |
          [ -d .next ] || { echo "Missing .next build output"; exit 1; }
          echo "Build output: $(du -sh .next/ | cut -f1)"

      - name: Comment build summary on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const marker = '<!-- ci-build-summary -->';
            const existing = comments.find(c => c.body.includes(marker));

            const body = [
              marker,
              '## Build Summary',
              '',
              '| | |',
              '|---|---|',
              `| **Status** | Passed |`,
              `| **Commit** | \`${{ github.sha }}\` |`,
              `| **Run** | [#${{ github.run_id }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) |`,
            ].join('\n');

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }
