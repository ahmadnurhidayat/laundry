version: 2

updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: '09:00'
      timezone: Asia/Jakarta
    open-pull-requests-limit: 5
    groups:
      nextjs:
        patterns:
          - next
          - '@next/*'
      cloudflare:
        patterns:
          - '@opennextjs/*'
          - wrangler
          - '@cloudflare/*'
      dev-tools:
        patterns:
          - typescript
          - '@types/*'
          - eslint
    labels:
      - dependencies
    commit-message:
      prefix: 'chore(deps)'
      prefix-development: 'chore(deps-dev)'
    ignore:
      - dependency-name: next
        update-types:
          - version-update:semver-major

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: '09:00'
      timezone: Asia/Jakarta
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - github-actions
    commit-message:
      prefix: 'chore(ci)'
