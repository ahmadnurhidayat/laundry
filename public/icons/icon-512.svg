  <circle cx="270" cy="165" r="6" fill="rgba(255,255,255,0.25)"/>
  <!-- Text -->
  <text x="256" y="400" font-family="Arial, sans-serif" font-size="60" font-weight="bold" fill="white" text-anchor="middle" letter-spacing="8">LAUNDRY</text>
