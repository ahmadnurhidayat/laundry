      <stop offset="0%" style="stop-color:#2563EB"/>
      <stop offset="100%" style="stop-color:#1D4ED8"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <!-- Watermark pattern -->
  <text x="256" y="480" font-family="Arial, sans-serif" font-size="72" font-weight="bold" fill="rgba(255,255,255,0.06)" text-anchor="middle" letter-spacing="20">LAUNDRY</text>
  <text x="256" y="410" font-family="Arial, sans-serif" font-size="72" font-weight="bold" fill="rgba(255,255,255,0.06)" text-anchor="middle" letter-spacing="20">LAUNDRY</text>
  <text x="256" y="340" font-family="Arial, sans-serif" font-size="72" font-weight="bold" fill="rgba(255,255,255,0.06)" text-anchor="middle" letter-spacing="20">LAUNDRY</text>
  <text x="256" y="270" font-family="Arial, sans-serif" font-size="72" font-weight="bold" fill="rgba(255,255,255,0.04)" text-anchor="middle" letter-spacing="20">LAUNDRY</text>
  <!-- Main icon: washing machine simplified -->
  <circle cx="256" cy="200" r="110" fill="none" stroke="white" stroke-width="8"/>
