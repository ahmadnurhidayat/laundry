  </defs>
  <rect width="192" height="192" rx="40" fill="url(#bg)"/>
  <!-- Watermark pattern -->
  <text x="96" y="180" font-family="Arial, sans-serif" font-size="28" font-weight="bold" fill="rgba(255,255,255,0.06)" text-anchor="middle" letter-spacing="8">LAUNDRY</text>
  <text x="96" y="155" font-family="Arial, sans-serif" font-size="28" font-weight="bold" fill="rgba(255,255,255,0.06)" text-anchor="middle" letter-spacing="8">LAUNDRY</text>
  <text x="96" y="130" font-family="Arial, sans-serif" font-size="28" font-weight="bold" fill="rgba(255,255,255,0.06)" text-anchor="middle" letter-spacing="8">LAUNDRY</text>
  <!-- Main icon: washing machine simplified -->
  <circle cx="96" cy="78" r="42" fill="none" stroke="white" stroke-width="4"/>
  <circle cx="96" cy="78" r="30" fill="none" stroke="rgba(255,255,255,0.5)" stroke-width="2"/>
  <circle cx="96" cy="78" r="12" fill="rgba(255,255,255,0.3)"/>
  <!-- Water bubbles -->
